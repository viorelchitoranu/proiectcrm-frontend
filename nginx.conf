# ============================================================
# nginx.conf — CRM Frontend (container Docker)
#
# Acest fișier configurează nginx-ul din containerul Docker.
# SSL/TLS este terminat de nginx-ul de pe VPS (nginx.prod.conf),
# nu în container — arhitectura standard reverse-proxy.
#
# Security headers adăugate conform:
#   - OWASP Secure Headers Project: https://owasp.org/www-project-secure-headers/
#   - nginx ngx_http_headers_module: https://nginx.org/en/docs/http/ngx_http_headers_module.html
#
# CSP configurat pentru React SPA cu WebSocket (STOMP/SockJS):
#   - script-src 'self' 'unsafe-inline' — necesar pentru Vite build (chunk-uri inline)
#   - connect-src 'self' ws: wss:        — necesar pentru WebSocket STOMP
#   - img-src 'self' data: https:        — permite avatare/logo externe
# ============================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Ascunde versiunea nginx din răspunsuri ────────────────────────────────
    # Ref: https://nginx.org/en/docs/http/ngx_http_core_module.html#server_tokens
    server_tokens off;

    # ── Security Headers ──────────────────────────────────────────────────────
    # Aplicate pe toate răspunsurile prin directiva `always`
    # (inclusiv pe răspunsuri cu status 4xx/5xx).
    #
    # Strict-Transport-Security: forțează HTTPS, aplicat de nginx-ul VPS (nu aici).
    # Lăsat comentat în container — va fi setat de nginx-ul cu SSL de pe VPS.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Previne MIME-type sniffing (atacuri prin upload de fișiere cu tip greșit)
    # Ref: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
    add_header X-Content-Type-Options "nosniff" always;

    # Previne clickjacking — pagina nu poate fi înglobată în iframe extern
    # Ref: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Frame-Options
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Controlează informațiile trimise în header-ul Referer
    # Ref: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Referrer-Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restricționează accesul la API-uri de browser (cameră, microfon, geolocație)
    # Ref: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

    # Content Security Policy — protecție principală contra XSS
    # Valori configurate pentru React SPA + WebSocket STOMP + Ant Design
    #
    # default-src 'self'           — toate resursele doar de pe același origin
    # script-src 'self'            — scripturi doar proprii (Vite elimină inline în prod)
    # style-src 'self' 'unsafe-inline' — Ant Design injectează stiluri inline
    # img-src 'self' data: https:  — imagini proprii + data URIs + HTTPS extern (logo)
    # font-src 'self'              — fonturi doar proprii
    # connect-src 'self' ws: wss:  — fetch/XHR propriu + WebSocket (STOMP/SockJS)
    # frame-ancestors 'none'       — interzice înglobarea în iframe (redundant cu X-Frame-Options)
    # base-uri 'self'              — previne injectarea <base> tag
    # form-action 'self'           — form submit doar pe același origin
    # object-src 'none'            — interzice Flash/plugin-uri
    #
    # Ref: https://content-security-policy.com/ + https://owasp.org/www-project-secure-headers/
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';" always;

    # ── Compresie gzip ────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Assets statice — cache agresiv (hash în filename prin Vite) ───────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Suprascrie security headers pentru assets statice (nu au nevoie de CSP)
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ── Proxy API → backend Spring Boot ──────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Proxy WebSocket → backend Spring Boot (STOMP/SockJS) ─────────────────
    location /ws/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── React SPA — fallback la index.html pentru client-side routing ─────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
